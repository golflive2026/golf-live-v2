services:
  - type: web
    name: golf-live-scoring
    runtime: node
    buildCommand: npm ci && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_PATH
        value: /opt/render/project/src/data/data.db
    disk:
      name: golf-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
